<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Registration form</h1>
    <form action="multimedia.html" method="get">
      <fieldset>
        <legend>Personal details</legend>
        <label for="">First Name</label>
        <input type="text" /> <br /><br />
        <label for="">Middle Name</label>
        <input type="text" /> <br />
        <br />
        <label for="">Last Name</label>
        <input type="text" /> <br /><br />
        <label for="">Father's Name / Guardian's Name</label>
        <input type="text" /> <br /><br />
        <label for="">Email</label>
        <input type="email" />
        <label for="">Contact no.</label>
        <input type="tel" />
        <label for="">DOB</label>
        <input type="date" />
      </fieldset>
      <fieldset>
        <legend>Address</legend>
        <label for="">Address line 1</label>
        <input type="text" /> <br /><br />
        <label for="">Address line 2</label>
        <input type="text" /><br /><br />
        <label for="">City</label>
        <select>
          <option>Bengaluru</option>
          <option>Delhi</option>
          <option>Mumbai</option>
          <option>Chennai</option>
          <option>Hyderabad</option>
          <option>Noida</option>
          <option>Bhubneshwar</option>
          <option>Kochi</option>
          <option>Pune</option>
          <option>Kolkata</option>
          <option>Patna</option>
          <option>Indore</option>
          <option>Ranchi</option>
          <option>Lucknow</option>
          <option>Amritsar</option>
        </select>
        <label for="">State</label>
        <select>
          <option>Karnataka</option>
          <option>Tamil Nadu</option>
          <option>Andhra Pradesh</option>
          <option>Odisha</option>
          <option>Kerela</option>
          <option>Maharastra</option>
          <option>Sikkim</option>
          <option>Madhya Pradesh</option>
          <option>Uttar Pradesh</option>
          <option>Haryana</option>
          <option>Punjab</option>
          <option>Bihar</option>
          <option>Rajesthan</option>
          <option>Gujrat</option>
          <option>Jharkhand</option>
        </select>
        <label for="">PIN Code</label>
        <input type="number" />
      </fieldset>
      <fieldset>
        <legend>Additional Information</legend>
        <label for="">Skills</label><br />
        <input type="checkbox" />
        <label for="">HTML</label>
        <input type="checkbox" />
        <label for="">CSS</label>
        <input type="checkbox" />
        <label for="">JS</label>
        <input type="checkbox" />
        <label for="">React</label>
        <input type="checkbox" />
        <label for="">REST api</label>
        <input type="checkbox" />
        <label for="">Node js</label>
        <input type="checkbox" />
        <label for="">Add Other Skills</label>
        <br /><br />
        <label for="">Other skills</label>
        <input type="text" />
        <br /><br />
        <label for="">How many years of experience you have in react</label
        ><br />
        <input type="number" /><br><br>
        <label for="">How many years of experience you have in js</label><br />
        <input type="number" /><br><br>
        <label for="">How many years of experience you have in REST api</label
        <input type="number" />
        <label for="">How many years of experience you have in Node js</label
        ><br>
        <input type="number" />
         <br><br>
        <label for="">Gender</label>
        <br>
         <input type="radio" name="gender" />
        <label for="">Male</label>
        <input type="radio" name="gender" />
        <label for="">Female</label>
        <input type="radio" name="gender" />
        <label for="">Others</label>
        <input type="radio" name="gender" />
        <label for="">Prefer Not to disclose</label>
      </fieldset>
      <fieldset>
        <legend>Upload Your CV</legend>
        <input type="file">
      </fieldset>
      <fieldset>
       <button>Apply</button>
    </fieldset>
    </form>
  </body>
</html>
